        @media screen and (min-width: 1001px){
            body {
                margin: 0;
                padding: 0;

                justify-content: center;
                align-items: center;
                margin-top: 5px;
                background-color: #060C27;
                font-family: 'Open Sans', sans-serif; 
            }

            .consulter {
                background-color: #060C27;
                color: #ffffff;
                border-radius: 4px;
                padding: 5px;
                width:800px;
                display: inline-block;
                text-align: center;
                height: 200px;
                margin-top: 50px;
            }

            #title{
                font-size: 55px;
                font-weight: bold;
                color: white;
                text-align: center;
                margin-bottom: 10px;
            }

            #subtext {
                font-size: 20px;
                color: white;
                text-align: center;
                margin-bottom: 30px;
            }

            .searchBox {
                margin-top: 1%;
                display: grid;
                place-items: center; /* Center both horizontally and vertically */
            }

            #searchInput {
                background-color: #292e45;
                color: #ffffff;
                height: 30px;
                width: 500px;
                padding: 10px;
                border: 1px solid #292e45;
                border-radius: 7px;
                font-size: 16px;
            }

            #searchInput:focus {
                outline: none;
            }

            #suggestionContainer {
                display: none;
                position: absolute;
                z-index: 9999;
                left: 50%;
                transform: translateX(-50%);
                border: 1px solid black;
                border-bottom-left-radius: 4px;
                border-bottom-right-radius: 4px;
                width: 520px;
                margin-top: -2px;
                background-color: #292e45;
            }

            #suggestionContainer ul {
                list-style-type: none; /* Remove the default dot (bullet) */
                padding: 0; /* Remove default padding */
            }

            #suggestionContainer ul li {
                padding-left: 5px; /* Add a small margin to the left of each item */
                padding-top: 10px;
                padding-bottom: 10px;
                border-bottom: 1px solid #ccc;
                border-top: 1px solid #ccc;
            }

            #suggestionContainer ul li:hover {
                background-color: #969393; /* Add a background color when hovered */
            }



            /*Table data*/
            .infoProfessional {
                margin-top: 1%;
                border-collapse: collapse;
                width: 100%;

                border-collapse: separate;
                border-spacing: 5px;
            }

            .infoProfessional th, .infoProfessional td {
                border: 1px solid black; /* Just for demonstration */
                padding: 10px;
                border: 1px solid #292e45;
                padding: 8px;
                text-align: center;
                border-radius: 10px; 
            }

            .infoProfessional th {
                background-color: #292e45;
            }

            .infoProfessional td {
                background-color: #ffffff;
                color: #000000;
            }

            #logo {
                margin-top: 5px;
                width: 26%;
            }
        }

                },
                "Atendimento Offsite": {
                    "Junior": 43.346704499999994,
                    "Pleno": 92.29724999999999,
                    "Senior": 138.6831375,
                    "Especialista": 192.6466335
                }
            },
            {
                "ALOCAÇÃO": "UX/UI DESIGNER",
                "Atendimento Onsite": {
                    "Junior": 38.533482,
                    "Pleno": 77.0600385,
                    "Senior": 110.020032,
                    "Especialista": 164.8199745
                },
                "Atendimento Offsite": {
                    "Junior": 33.7202595,
                    "Pleno": 67.4335935,
                    "Senior": 95.762736,
                    "Especialista": 149.840118
                }
            }
        ];

        const input = document.getElementById("searchInput");
        const suggestionContainer = document.getElementById("suggestionContainer");
        const suggestionList = document.createElement("ul");
        const alocacoes = data.map(item => item.ALOCAÇÃO);
        const salaryInfo = document.getElementsByClassName("");
        


        input.addEventListener("focus", function() {
            suggestionContainer.style.display = "block";  
        });

        input.addEventListener("blur", function() {
            setTimeout(function() {
                suggestionContainer.style.display = "none";
            }, 150); 
        });



        input.addEventListener("keyup", (event) => {
        const inputValue = event.target.value.trim().toLowerCase();
        const AlocacoesFiltradas = alocacoes.filter(alocacao => alocacao.toLowerCase().includes(inputValue));

        suggestionList.innerHTML = "";

        if (inputValue === '') {
            suggestionContainer.style.display = "none";
        } else {
            if (AlocacoesFiltradas.length > 0) {
                const limitedSuggestions = AlocacoesFiltradas.slice(0, 5);
                limitedSuggestions.forEach(alocacao => {
                const listItem = document.createElement("li");
                listItem.textContent = alocacao;
                listItem.addEventListener("click", () => {
                input.value = alocacao;
                updateSalaryInfo(alocacao)
                suggestionContainer.style.display = "none";
                });
                suggestionList.appendChild(listItem);
            });

            suggestionContainer.innerHTML = ""; 
            suggestionContainer.appendChild(suggestionList);
            suggestionContainer.style.display = "block";
            } else {
            suggestionContainer.innerHTML = "";
            suggestionContainer.style.display = "none";
            }
        }
        });

        function getInfoByAlocacao(alocacao) {
            // Find the object with the specified value for "ALOCAÇÃO"
            const matchedData = data.find(entry => entry["ALOCAÇÃO"] === alocacao);
            
            if (matchedData) {
                // Extract the required data from the matched object
                const onsiteValues = Object.values(matchedData["Atendimento Onsite"]);
                const offsiteValues = Object.values(matchedData["Atendimento Offsite"]);
                
                // Concatenate and return the list
                return onsiteValues.concat(offsiteValues);
            } else {
                console.error(`ALOCAÇÃO "${alocacao}" not found.`);
                return [];
            }
        }

        function updateSalaryInfo(alocacao) {
            values = getInfoByAlocacao(alocacao)
            // Find the row with the class name "salaryInfo"
            var salaryRow = document.querySelector('.salaryInfo');

            // If the row is found
            if (salaryRow) {
                // Select all the <td> elements inside the row
                var tdElements = salaryRow.querySelectorAll('td');

                // Loop through each <td> and update its content with the corresponding value from the provided list
                tdElements.forEach(function(td, index) {
                    td.textContent = 'R$' + values[index].toFixed(2).toString();
                });
            } else {
                console.error('Row with class "salaryInfo" not found.');
            }
        }

    </script>
